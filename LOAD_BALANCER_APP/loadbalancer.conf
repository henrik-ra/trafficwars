# Original config for team 3, with rate limiting added

# --- Rate limit zones (added) ---
limit_req_zone  $binary_remote_addr zone=perip:10m    rate=20r/s;
limit_req_zone  $binary_remote_addr zone=checkout:10m  rate=10r/s;
limit_conn_zone $binary_remote_addr zone=connperip:10m;

upstream application {
    server application.team3;
}

server {
    listen 80;

    # Block dumb bots (User-Agent Check)
    if ($http_user_agent ~* (curl|wget|python|postman|insomnia|go-http-client|java|ruby)) {
        return 403;
    }

    # Per-IP connection cap (added)
    limit_conn connperip 20;

    location / {
        # General rate limit (added)
        limit_req zone=perip burst=40 nodelay;

        proxy_pass http://application;
    }

    location /checkout {
        # Stricter rate limit for checkout (added)
        limit_req  zone=checkout burst=20 nodelay;
        limit_conn connperip 10;

        proxy_pass http://application;
    }
}
