# Original config for team 3, with rate limiting added

# --- Rate limit zones (added) ---
limit_req_zone  $binary_remote_addr zone=perip:10m    rate=3r/s;
limit_req_zone  $binary_remote_addr zone=checkout:10m  rate=2r/s;
limit_conn_zone $binary_remote_addr zone=connperip:10m;

upstream application {
    server application.team3;
}

server {
    listen 80;

    # Per-IP connection cap (added)
    limit_conn connperip 20;

    location / {
        # General rate limit (added)
        limit_req zone=perip burst=10 nodelay;

        proxy_pass http://application;
    }

    location /checkout {
        # Stricter rate limit for checkout (added)
        limit_req  zone=checkout burst=5 nodelay;
        limit_conn connperip 10;

        proxy_pass http://application;
    }
}
